name: Matrix Config

on:
    workflow_dispatch

jobs:
    sample_job:
        strategy:
            matrix: 
               os: [ubuntu-latest, ubuntu-20.04, windows-latest]
               images: [hello-world, alpine]
               exclude:
                - images: alpine
                  os: windows-latest
        runs-on: ${{ matrix.os }}
        steps:
        - name: Docker Details
          run: docker info

        - name: Run ${{ matrix.os }}
          run: docker run ${{ matrix.images }}

